<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Острый край — Админка</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="components/product-store.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: rgb(245,245,245); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
    .btn { border: none; border-radius: 8px; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 600; transition: all .15s; }
    .btn-blue { background: rgb(0,186,250); color: #fff; box-shadow: 0 3px 0 rgba(9,136,189,0.7); }
    .btn-blue:hover { filter: brightness(1.08); }
    .btn-red { background: rgb(255,103,103); color: #fff; }
    .btn-red:hover { filter: brightness(1.1); }
    .btn-ghost { background: transparent; border: 1.5px solid #ddd; color: #555; }
    .btn-ghost:hover { background: #f0f0f0; }
    .btn-green { background: #4caf50; color: #fff; }
    .btn-green:hover { filter: brightness(1.08); }
    input, textarea, select {
      font-family: 'Inter', sans-serif; border: 1.5px solid #ddd; border-radius: 8px;
      padding: 9px 14px; font-size: 15px; outline: none; background: #fff; width: 100%;
      transition: border-color .15s;
    }
    input:focus, textarea:focus, select:focus { border-color: rgb(0,186,250); }
    label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 5px; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: rgb(0,186,250); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const INIT_SECTIONS = [
      { id:1, label:'Наши работы', photos:[{id:1,src:'assets/services1.jpg',alt:'Заточка кусачек'},{id:2,src:'assets/services2.jpg',alt:'Заточка ножниц'},{id:3,src:'assets/block1.jpg',alt:'Мастерская'}] },
      { id:2, label:'Фото выставок', photos:[{id:4,src:'assets/services2.jpg',alt:'Выставка 2023'},{id:5,src:'assets/block1.jpg',alt:'Наш стенд'}] },
      { id:3, label:'Наши сертификаты', photos:[{id:6,src:'assets/services1.jpg',alt:'Сертификат 1'}] },
    ];

    const INIT_PRICES = [
      {id:1,cat:'Маникюрный инструмент',service:'Кусачки ногтевые',price:'400 ₽'},
      {id:2,cat:'Маникюрный инструмент',service:'Ножницы маникюрные',price:'400 ₽'},
      {id:3,cat:'Парикмахерский инструмент',service:'Ножницы прямые',price:'400 ₽'},
      {id:4,cat:'Парикмахерский инструмент',service:'Ножницы филировочные',price:'450 ₽'},
      {id:5,cat:'Грумерский инструмент',service:'Ножницы грумерские',price:'от 550 ₽'},
      {id:6,cat:'Домашний инструмент',service:'Ножи кухонные',price:'от 300 ₽'},
    ];

    const PRODUCT_CATS = ['Кусачки','Ножницы','Пинцеты и пушеры','Расходники','Аппараты','Наборы'];

    // ── SIDEBAR ──────────────────────────────────────────────────────
    const MENU = [
      { key:'dashboard', icon:'📊', label:'Сводка' },
      { key:'products',  icon:'📦', label:'Магазин' },
      { key:'gallery',   icon:'🖼️', label:'Галерея' },
      { key:'prices',    icon:'💰', label:'Прайс-лист' },
      { key:'orders',    icon:'📋', label:'Заказы' },
      { key:'contacts',  icon:'📞', label:'Контакты' },
    ];

    function Sidebar({ active, onNav }) {
      return (
        <aside style={{ width:220, background:'rgb(36,35,35)', display:'flex', flexDirection:'column', flexShrink:0, padding:'0 0 20px' }}>
          <div style={{ padding:'16px 20px', borderBottom:'1px solid rgba(255,255,255,0.1)', marginBottom:8 }}>
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              <img src="assets/logo.png" style={{ width:36, height:36, objectFit:'contain' }} />
              <div>
                <div style={{ color:'#fff', fontWeight:700, fontSize:15, lineHeight:1.2 }}>Острый край</div>
                <div style={{ color:'rgba(255,255,255,0.4)', fontSize:11 }}>Администратор</div>
              </div>
            </div>
          </div>
          {MENU.map(item => (
            <button key={item.key} onClick={() => onNav(item.key)} className="btn" style={{
              display:'flex', alignItems:'center', gap:12, padding:'11px 20px',
              margin:'2px 8px', borderRadius:10, fontSize:15, textAlign:'left',
              background: active===item.key ? 'rgb(0,186,250)' : 'transparent',
              color: active===item.key ? '#fff' : 'rgba(255,255,255,0.7)',
            }}>
              <span style={{ fontSize:18 }}>{item.icon}</span>{item.label}
            </button>
          ))}
          <div style={{ flex:1 }} />
          <div style={{ padding:'12px 16px', borderTop:'1px solid rgba(255,255,255,0.1)', marginTop:8, display:'flex', flexDirection:'column', gap:8 }}>
            <a href="shop.html" target="_blank" style={{ color:'rgba(255,255,255,0.5)', fontSize:13, textDecoration:'none' }}>→ Открыть магазин</a>
            <a href="index.html" style={{ color:'rgba(255,255,255,0.5)', fontSize:13, textDecoration:'none' }}>← На сайт</a>
          </div>
        </aside>
      );
    }

    function TopBar({ section }) {
      const item = MENU.find(m => m.key===section);
      return (
        <div style={{ height:56, background:'rgb(255,103,103)', display:'flex', alignItems:'center', padding:'0 28px', gap:12, flexShrink:0 }}>
          <span style={{ fontSize:20 }}>{item?.icon}</span>
          <span style={{ color:'#fff', fontWeight:700, fontSize:18 }}>{item?.label}</span>
          <div style={{ flex:1 }} />
          <span style={{ color:'rgba(255,255,255,0.8)', fontSize:14 }}>
            {new Date().toLocaleDateString('ru',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}
          </span>
        </div>
      );
    }

    // ── DASHBOARD ────────────────────────────────────────────────────
    function Dashboard({ products, prices, sections }) {
      const stats = [
        { label:'Товаров в магазине', value:products.length, icon:'📦', color:'rgb(0,186,250)' },
        { label:'Активных товаров', value:products.filter(p=>p.active).length, icon:'✅', color:'#4caf50' },
        { label:'Позиций в прайсе', value:prices.length, icon:'💰', color:'#ff9800' },
        { label:'Секций галереи', value:sections.length, icon:'🖼️', color:'#9c27b0' },
      ];
      return (
        <div style={{ padding:28 }}>
          <h2 style={{ fontSize:24, fontWeight:700, marginBottom:24 }}>Добро пожаловать в панель управления</h2>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:20, marginBottom:32 }}>
            {stats.map(s => (
              <div key={s.label} style={{ background:'#fff', borderRadius:14, padding:'20px 24px', boxShadow:'0 2px 12px rgba(0,0,0,0.07)', borderTop:`4px solid ${s.color}` }}>
                <div style={{ fontSize:32, marginBottom:8 }}>{s.icon}</div>
                <div style={{ fontSize:36, fontWeight:700, color:s.color }}>{s.value}</div>
                <div style={{ fontSize:14, color:'#777', marginTop:4 }}>{s.label}</div>
              </div>
            ))}
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:20 }}>
            <div style={{ background:'#fff', borderRadius:14, padding:'20px 24px', boxShadow:'0 2px 12px rgba(0,0,0,0.07)' }}>
              <div style={{ fontWeight:700, fontSize:17, marginBottom:14 }}>Товары с малым остатком</div>
              {products.filter(p=>p.stock<=5).length===0
                ? <div style={{ color:'#aaa', fontSize:15 }}>Все в норме ✅</div>
                : products.filter(p=>p.stock<=5).map(p => (
                  <div key={p.id} style={{ display:'flex', justifyContent:'space-between', padding:'8px 0', borderBottom:'1px solid #f0f0f0', fontSize:15 }}>
                    <span>{p.name}</span>
                    <span style={{ color:'rgb(255,103,103)', fontWeight:700 }}>Осталось: {p.stock}</span>
                  </div>
                ))
              }
            </div>
            <div style={{ background:'#fff', borderRadius:14, padding:'20px 24px', boxShadow:'0 2px 12px rgba(0,0,0,0.07)' }}>
              <div style={{ fontWeight:700, fontSize:17, marginBottom:14 }}>Быстрые ссылки</div>
              <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                {[{label:'→ Открыть сайт (визитка)',href:'index.html'},{label:'→ Открыть магазин',href:'shop.html'}].map(l => (
                  <a key={l.href} href={l.href} target="_blank" style={{ color:'rgb(0,186,250)', textDecoration:'none', fontSize:15, padding:'8px 12px', borderRadius:8, background:'rgba(0,186,250,0.07)' }}>{l.label}</a>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── PRODUCT EDITOR MODAL ─────────────────────────────────────────
    function ProductEditorModal({ product, onSave, onClose }) {
      const isNew = !product.id;
      const [form, setForm] = useState(product);
      const [newPhotoUrl, setNewPhotoUrl] = useState('');
      const [newSpecKey, setNewSpecKey] = useState('');
      const [newSpecVal, setNewSpecVal] = useState('');
      const fileRef = useRef();

      const set = (key, val) => setForm(f => ({ ...f, [key]: val }));

      // Photos
      const addPhotoUrl = () => {
        if (!newPhotoUrl.trim()) return;
        set('photos', [...(form.photos||[]), newPhotoUrl.trim()]);
        setNewPhotoUrl('');
      };
      const removePhoto = (i) => set('photos', form.photos.filter((_,idx)=>idx!==i));
      const movePhoto = (i, dir) => {
        const arr = [...(form.photos||[])];
        const j = i + dir;
        if (j < 0 || j >= arr.length) return;
        [arr[i], arr[j]] = [arr[j], arr[i]];
        set('photos', arr);
      };

      // File upload → base64
      const handleFileUpload = (e) => {
        const files = Array.from(e.target.files);
        files.forEach(file => {
          const reader = new FileReader();
          reader.onload = ev => set('photos', [...(form.photos||[]), ev.target.result]);
          reader.readAsDataURL(file);
        });
      };

      // Specs
      const addSpec = () => {
        if (!newSpecKey.trim()) return;
        set('specs', [...(form.specs||[]), { key: newSpecKey.trim(), value: newSpecVal.trim() }]);
        setNewSpecKey(''); setNewSpecVal('');
      };
      const removeSpec = (i) => set('specs', form.specs.filter((_,idx)=>idx!==i));
      const updateSpec = (i, field, val) => set('specs', form.specs.map((s,idx)=>idx===i?{...s,[field]:val}:s));

      const handleSave = () => {
        if (!form.name?.trim()) return alert('Введите название товара');
        onSave({ ...form, price: Number(form.price)||0, stock: Number(form.stock)||0, id: form.id || Date.now() });
      };

      return (
        <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.6)', zIndex:300, display:'flex', alignItems:'center', justifyContent:'center', padding:20 }}>
          <div onClick={e=>e.stopPropagation()} style={{
            background:'#fff', borderRadius:16, width:'100%', maxWidth:920, maxHeight:'92vh',
            overflow:'hidden', display:'flex', flexDirection:'column', boxShadow:'0 20px 60px rgba(0,0,0,0.25)',
          }}>
            {/* Header */}
            <div style={{ padding:'16px 24px', borderBottom:'1px solid #eee', display:'flex', justifyContent:'space-between', alignItems:'center', flexShrink:0 }}>
              <div style={{ fontSize:20, fontWeight:700 }}>{isNew ? 'Новый товар' : 'Редактировать товар'}</div>
              <button onClick={onClose} style={{ background:'none', border:'none', fontSize:24, cursor:'pointer', color:'#aaa' }}>×</button>
            </div>

            {/* Body */}
            <div style={{ flex:1, overflowY:'auto', padding:24 }}>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:24 }}>

                {/* LEFT column */}
                <div style={{ display:'flex', flexDirection:'column', gap:18 }}>

                  {/* Basic info */}
                  <div style={{ background:'#fafafa', borderRadius:12, padding:16 }}>
                    <div style={{ fontSize:14, fontWeight:700, color:'#888', marginBottom:12, textTransform:'uppercase', letterSpacing:'0.05em' }}>Основная информация</div>
                    <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                      <div>
                        <label>Название товара *</label>
                        <input value={form.name||''} onChange={e=>set('name',e.target.value)} placeholder="Кусачки ногтевые профессиональные" />
                      </div>
                      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
                        <div>
                          <label>Категория</label>
                          <select value={form.cat||PRODUCT_CATS[0]} onChange={e=>set('cat',e.target.value)}>
                            {PRODUCT_CATS.map(c=><option key={c} value={c}>{c}</option>)}
                          </select>
                        </div>
                        <div>
                          <label>Статус</label>
                          <select value={form.active===false?'false':'true'} onChange={e=>set('active',e.target.value==='true')}>
                            <option value="true">Активен (виден в магазине)</option>
                            <option value="false">Скрыт</option>
                          </select>
                        </div>
                      </div>
                      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
                        <div>
                          <label>Цена, ₽</label>
                          <input type="number" value={form.price||''} onChange={e=>set('price',e.target.value)} placeholder="1850" />
                        </div>
                        <div>
                          <label>Остаток, шт.</label>
                          <input type="number" value={form.stock||''} onChange={e=>set('stock',e.target.value)} placeholder="10" />
                        </div>
                      </div>
                      <div>
                        <label>Описание товара</label>
                        <textarea
                          value={form.desc||''}
                          onChange={e=>set('desc',e.target.value)}
                          placeholder="Подробное описание товара..."
                          rows={5}
                          style={{ resize:'vertical' }}
                        />
                      </div>
                    </div>
                  </div>

                  {/* Specs */}
                  <div style={{ background:'#fafafa', borderRadius:12, padding:16 }}>
                    <div style={{ fontSize:14, fontWeight:700, color:'#888', marginBottom:12, textTransform:'uppercase', letterSpacing:'0.05em' }}>Характеристики</div>
                    {/* Existing specs */}
                    {(form.specs||[]).map((spec, i) => (
                      <div key={i} style={{ display:'grid', gridTemplateColumns:'1fr 1fr 32px', gap:8, marginBottom:8, alignItems:'center' }}>
                        <input value={spec.key} onChange={e=>updateSpec(i,'key',e.target.value)} placeholder="Параметр" />
                        <input value={spec.value} onChange={e=>updateSpec(i,'value',e.target.value)} placeholder="Значение" />
                        <button onClick={()=>removeSpec(i)} className="btn btn-red" style={{ padding:'0', width:32, height:36, display:'flex', alignItems:'center', justifyContent:'center', fontSize:16 }}>×</button>
                      </div>
                    ))}
                    {/* Add spec */}
                    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr auto', gap:8, marginTop:8 }}>
                      <input value={newSpecKey} onChange={e=>setNewSpecKey(e.target.value)} placeholder="Параметр (напр. Материал)" onKeyDown={e=>e.key==='Enter'&&addSpec()} />
                      <input value={newSpecVal} onChange={e=>setNewSpecVal(e.target.value)} placeholder="Значение (напр. Сталь 440C)" onKeyDown={e=>e.key==='Enter'&&addSpec()} />
                      <button onClick={addSpec} className="btn btn-blue" style={{ padding:'9px 16px', fontSize:14, whiteSpace:'nowrap' }}>+ Добавить</button>
                    </div>
                  </div>
                </div>

                {/* RIGHT column — Photos */}
                <div style={{ display:'flex', flexDirection:'column', gap:18 }}>
                  <div style={{ background:'#fafafa', borderRadius:12, padding:16, flex:1 }}>
                    <div style={{ fontSize:14, fontWeight:700, color:'#888', marginBottom:12, textTransform:'uppercase', letterSpacing:'0.05em' }}>
                      Фотографии товара
                      <span style={{ marginLeft:8, fontSize:12, color:'#bbb', fontWeight:400, textTransform:'none' }}>первое фото — главное</span>
                    </div>

                    {/* Photo grid */}
                    <div style={{ display:'flex', flexWrap:'wrap', gap:10, marginBottom:16, minHeight:80 }}>
                      {(form.photos||[]).length === 0 && (
                        <div style={{ color:'#bbb', fontSize:14, padding:'20px 0' }}>Нет фотографий</div>
                      )}
                      {(form.photos||[]).map((src, i) => (
                        <div key={i} style={{ position:'relative', width:110, flexShrink:0 }}>
                          <div style={{
                            width:110, height:80,
                            background:`url(${src}) center/cover no-repeat`,
                            borderRadius:8, border: i===0 ? '2.5px solid rgb(0,186,250)' : '1.5px solid #ddd',
                          }} />
                          {i===0 && (
                            <div style={{ position:'absolute', top:4, left:4, background:'rgb(0,186,250)', color:'#fff', fontSize:10, fontWeight:700, padding:'2px 6px', borderRadius:4 }}>ГЛАВНОЕ</div>
                          )}
                          {/* Controls */}
                          <div style={{ display:'flex', gap:3, marginTop:4, justifyContent:'center' }}>
                            <button onClick={()=>movePhoto(i,-1)} disabled={i===0} className="btn btn-ghost" style={{ padding:'2px 6px', fontSize:13, opacity:i===0?0.3:1 }}>←</button>
                            <button onClick={()=>movePhoto(i,1)} disabled={i===(form.photos||[]).length-1} className="btn btn-ghost" style={{ padding:'2px 6px', fontSize:13, opacity:i===(form.photos||[]).length-1?0.3:1 }}>→</button>
                            <button onClick={()=>removePhoto(i)} className="btn btn-red" style={{ padding:'2px 8px', fontSize:13 }}>×</button>
                          </div>
                        </div>
                      ))}
                    </div>

                    {/* Upload from device */}
                    <div style={{ marginBottom:12 }}>
                      <label>Загрузить с устройства</label>
                      <div style={{
                        border:'2px dashed #ddd', borderRadius:10, padding:'16px',
                        textAlign:'center', cursor:'pointer', background:'#fff',
                        transition:'border-color .15s, background .15s',
                      }}
                        onClick={()=>fileRef.current.click()}
                        onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor='rgb(0,186,250)';e.currentTarget.style.background='rgba(0,186,250,0.04)'}}
                        onDragLeave={e=>{e.currentTarget.style.borderColor='#ddd';e.currentTarget.style.background='#fff'}}
                        onDrop={e=>{
                          e.preventDefault();
                          e.currentTarget.style.borderColor='#ddd';e.currentTarget.style.background='#fff';
                          const files = Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'));
                          files.forEach(file=>{
                            const reader = new FileReader();
                            reader.onload = ev => set('photos', p => [...(p||[]), ev.target.result]);
                            reader.readAsDataURL(file);
                          });
                        }}
                      >
                        <div style={{ fontSize:28, marginBottom:4 }}>📁</div>
                        <div style={{ fontSize:14, color:'#888' }}>Нажмите или перетащите изображения</div>
                        <div style={{ fontSize:12, color:'#bbb', marginTop:2 }}>PNG, JPG, WEBP</div>
                      </div>
                      <input ref={fileRef} type="file" accept="image/*" multiple style={{ display:'none' }} onChange={handleFileUpload} />
                    </div>

                    {/* Add by URL */}
                    <div>
                      <label>Или добавить по URL</label>
                      <div style={{ display:'flex', gap:8 }}>
                        <input
                          value={newPhotoUrl}
                          onChange={e=>setNewPhotoUrl(e.target.value)}
                          placeholder="https://… или assets/photo.jpg"
                          onKeyDown={e=>e.key==='Enter'&&addPhotoUrl()}
                        />
                        <button onClick={addPhotoUrl} className="btn btn-blue" style={{ padding:'9px 16px', fontSize:14, whiteSpace:'nowrap' }}>+ URL</button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            {/* Footer */}
            <div style={{ padding:'16px 24px', borderTop:'1px solid #eee', display:'flex', gap:12, justifyContent:'flex-end', flexShrink:0 }}>
              <button onClick={onClose} className="btn btn-ghost" style={{ padding:'10px 24px', fontSize:16 }}>Отмена</button>
              <button onClick={handleSave} className="btn btn-green" style={{ padding:'10px 32px', fontSize:16 }}>
                {isNew ? '+ Создать товар' : '✓ Сохранить изменения'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ── PRODUCTS ADMIN ───────────────────────────────────────────────
    function ProductsAdmin({ products, setProducts }) {
      const [editProduct, setEditProduct] = useState(null);
      const [search, setSearch] = useState('');
      const [filterCat, setFilterCat] = useState('Все');

      const visible = products.filter(p => {
        const matchSearch = !search.trim() || p.name.toLowerCase().includes(search.toLowerCase());
        const matchCat = filterCat === 'Все' || p.cat === filterCat;
        return matchSearch && matchCat;
      });

      const handleSave = (saved) => {
        let updated;
        if (!saved.id || !products.find(p=>p.id===saved.id)) {
          updated = [...products, { ...saved, id: Date.now() }];
        } else {
          updated = products.map(p => p.id===saved.id ? saved : p);
        }
        setProducts(updated);
        window.ProductStore.save(updated);
        setEditProduct(null);
      };

      const handleDelete = (id) => {
        if (!confirm('Удалить товар?')) return;
        const updated = products.filter(p=>p.id!==id);
        setProducts(updated);
        window.ProductStore.save(updated);
      };

      const toggleActive = (id) => {
        const updated = products.map(p=>p.id===id?{...p,active:!p.active}:p);
        setProducts(updated);
        window.ProductStore.save(updated);
      };

      return (
        <div style={{ padding:24, overflowY:'auto', flex:1, display:'flex', flexDirection:'column', gap:16 }}>
          {/* Toolbar */}
          <div style={{ display:'flex', gap:12, alignItems:'center', flexWrap:'wrap' }}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Поиск товара…" style={{ width:240 }} />
            <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} style={{ width:180 }}>
              <option value="Все">Все категории</option>
              {PRODUCT_CATS.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
            <span style={{ color:'#aaa', fontSize:14 }}>{visible.length} товаров</span>
            <div style={{ flex:1 }} />
            <button
              onClick={()=>setEditProduct({ name:'', cat:PRODUCT_CATS[0], price:'', stock:'', active:true, desc:'', photos:[], specs:[] })}
              className="btn btn-blue" style={{ padding:'9px 22px', fontSize:15 }}>
              + Добавить товар
            </button>
          </div>

          {/* Products grid */}
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(280px, 1fr))', gap:16 }}>
            {visible.map(p => {
              const thumb = p.photos && p.photos.length>0 ? p.photos[0] : null;
              return (
                <div key={p.id} style={{
                  background:'#fff', borderRadius:14, overflow:'hidden',
                  boxShadow:'0 2px 12px rgba(0,0,0,0.07)',
                  border: p.active ? '2px solid transparent' : '2px solid rgba(0,0,0,0.08)',
                  opacity: p.active ? 1 : 0.7,
                  display:'flex', flexDirection:'column',
                }}>
                  {/* Thumb */}
                  <div style={{
                    height:160, position:'relative',
                    background: thumb ? `url(${thumb}) center/cover no-repeat` : 'rgb(232,232,232)',
                    display: thumb ? 'block' : 'flex', alignItems:'center', justifyContent:'center',
                  }}>
                    {!thumb && <span style={{ color:'#bbb', fontSize:13 }}>Нет фото</span>}
                    {/* Photo count badge */}
                    {p.photos && p.photos.length>0 && (
                      <div style={{ position:'absolute', bottom:8, right:8, background:'rgba(0,0,0,0.55)', color:'#fff', borderRadius:20, padding:'2px 8px', fontSize:11 }}>
                        {p.photos.length} фото
                      </div>
                    )}
                    {/* Active toggle */}
                    <button
                      onClick={()=>toggleActive(p.id)}
                      style={{
                        position:'absolute', top:8, right:8,
                        background: p.active ? 'rgba(76,175,80,0.9)' : 'rgba(0,0,0,0.45)',
                        border:'none', color:'#fff', borderRadius:20, padding:'3px 10px',
                        fontSize:12, fontWeight:700, cursor:'pointer',
                      }}>
                      {p.active ? 'Активен' : 'Скрыт'}
                    </button>
                  </div>

                  <div style={{ padding:'12px 14px', flex:1, display:'flex', flexDirection:'column', gap:6 }}>
                    <div style={{ fontSize:12, color:'rgb(0,186,250)', fontWeight:600 }}>{p.cat}</div>
                    <div style={{ fontSize:16, fontWeight:600, lineHeight:1.3, color:'#111' }}>{p.name}</div>
                    <div style={{ display:'flex', alignItems:'center', gap:12, marginTop:4 }}>
                      <span style={{ fontSize:20, fontWeight:700 }}>{(p.price||0).toLocaleString('ru')} ₽</span>
                      <span style={{ fontSize:13, color: p.stock<=5 ? 'rgb(255,103,103)' : '#888' }}>
                        Остаток: {p.stock}
                      </span>
                    </div>
                    {p.specs && p.specs.length>0 && (
                      <div style={{ fontSize:12, color:'#aaa' }}>{p.specs.length} характеристик</div>
                    )}
                  </div>

                  <div style={{ display:'flex', gap:8, padding:'0 14px 14px' }}>
                    <button onClick={()=>setEditProduct({...p})} className="btn btn-blue" style={{ flex:1, padding:'8px', fontSize:14 }}>✎ Редактировать</button>
                    <button onClick={()=>handleDelete(p.id)} className="btn btn-red" style={{ padding:'8px 14px', fontSize:14 }}>✕</button>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Editor modal */}
          {editProduct && (
            <ProductEditorModal
              product={editProduct}
              onSave={handleSave}
              onClose={()=>setEditProduct(null)}
            />
          )}
        </div>
      );
    }

    // ── GALLERY ADMIN ────────────────────────────────────────────────
    function GalleryAdmin({ sections, setSections }) {
      const [newLabel, setNewLabel] = useState('');
      const fileRefs = useRef({});

      const addSection = () => {
        if (!newLabel.trim()) return;
        setSections(prev=>[...prev,{id:Date.now(),label:newLabel.trim(),photos:[]}]);
        setNewLabel('');
      };
      const deleteSection = (id) => setSections(prev=>prev.filter(s=>s.id!==id));

      const addPhotoUrl = (sectionId) => {
        const url = prompt('URL или путь к фото:');
        if (!url) return;
        const alt = prompt('Описание фото:') || 'Фото';
        setSections(prev=>prev.map(s=>s.id===sectionId?{...s,photos:[...s.photos,{id:Date.now(),src:url,alt}]}:s));
      };

      const handleFileUpload = (sectionId, files) => {
        Array.from(files).forEach(file=>{
          const reader = new FileReader();
          reader.onload = ev => setSections(prev=>prev.map(s=>s.id===sectionId?{...s,photos:[...s.photos,{id:Date.now(),src:ev.target.result,alt:file.name}]}:s));
          reader.readAsDataURL(file);
        });
      };

      const deletePhoto = (sectionId, photoId) => setSections(prev=>prev.map(s=>s.id===sectionId?{...s,photos:s.photos.filter(p=>p.id!==photoId)}:s));

      return (
        <div style={{ padding:24, overflowY:'auto', flex:1 }}>
          <div style={{ background:'#fff', borderRadius:14, padding:'20px 24px', marginBottom:20, boxShadow:'0 2px 12px rgba(0,0,0,0.07)', display:'flex', gap:12, alignItems:'flex-end' }}>
            <div style={{ flex:1 }}>
              <label>Название новой секции</label>
              <input value={newLabel} onChange={e=>setNewLabel(e.target.value)} placeholder="Наши работы" onKeyDown={e=>e.key==='Enter'&&addSection()} />
            </div>
            <button onClick={addSection} className="btn btn-blue" style={{ padding:'9px 24px', fontSize:15, whiteSpace:'nowrap' }}>+ Добавить секцию</button>
          </div>
          {sections.map(sec => (
            <div key={sec.id} style={{ background:'#fff', borderRadius:14, marginBottom:16, boxShadow:'0 2px 12px rgba(0,0,0,0.07)', overflow:'hidden' }}>
              <div style={{ display:'flex', alignItems:'center', padding:'12px 20px', background:'rgba(0,186,250,0.07)', borderBottom:'1px solid rgba(0,186,250,0.15)' }}>
                <span style={{ fontSize:17, fontWeight:700, flex:1 }}>{sec.label}</span>
                <span style={{ color:'#aaa', fontSize:13, marginRight:12 }}>{sec.photos.length} фото</span>
                <button onClick={()=>{if(fileRefs.current[sec.id])fileRefs.current[sec.id].click();}} className="btn btn-ghost" style={{ padding:'5px 12px', fontSize:13, marginRight:8 }}>📁 Файл</button>
                <button onClick={()=>addPhotoUrl(sec.id)} className="btn btn-blue" style={{ padding:'5px 12px', fontSize:13, marginRight:8 }}>+ URL</button>
                <button onClick={()=>deleteSection(sec.id)} className="btn btn-red" style={{ padding:'5px 12px', fontSize:13 }}>Удалить</button>
                <input ref={el=>fileRefs.current[sec.id]=el} type="file" accept="image/*" multiple style={{ display:'none' }} onChange={e=>handleFileUpload(sec.id,e.target.files)} />
              </div>
              <div style={{ padding:'14px 20px', display:'flex', flexWrap:'wrap', gap:10 }}>
                {sec.photos.length===0&&<div style={{ color:'#bbb', fontSize:14 }}>Нет фото</div>}
                {sec.photos.map(photo=>(
                  <div key={photo.id} style={{ position:'relative', width:120, height:90 }}>
                    <div style={{ width:120, height:90, borderRadius:8, background:`url(${photo.src}) center/cover no-repeat`, border:'1.5px solid #eee' }} />
                    <div style={{ position:'absolute', bottom:0, left:0, right:0, background:'rgba(0,0,0,0.55)', color:'#fff', fontSize:10, padding:'2px 5px', borderRadius:'0 0 8px 8px', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{photo.alt}</div>
                    <button onClick={()=>deletePhoto(sec.id,photo.id)} style={{ position:'absolute', top:3, right:3, background:'rgba(255,103,103,0.9)', border:'none', color:'#fff', width:20, height:20, borderRadius:'50%', cursor:'pointer', fontSize:13, display:'flex', alignItems:'center', justifyContent:'center' }}>×</button>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ── PRICES ADMIN ─────────────────────────────────────────────────
    function PricesAdmin({ prices, setPrices }) {
      const [editId,setEditId]=useState(null);
      const [form,setForm]=useState({cat:'',service:'',price:''});
      const startAdd=()=>{setEditId('new');setForm({cat:'',service:'',price:''});};
      const startEdit=(row)=>{setEditId(row.id);setForm({cat:row.cat,service:row.service,price:row.price});};
      const save=()=>{
        if(!form.service.trim())return;
        if(editId==='new'){setPrices(prev=>[...prev,{id:Date.now(),...form}]);}
        else{setPrices(prev=>prev.map(p=>p.id===editId?{...p,...form}:p));}
        setEditId(null);
      };
      const cats=[...new Set(prices.map(p=>p.cat))];
      return (
        <div style={{ padding:24, overflowY:'auto', flex:1 }}>
          <div style={{ display:'flex', justifyContent:'space-between', marginBottom:16 }}>
            <h3 style={{ fontSize:20, fontWeight:700 }}>Позиции прайса</h3>
            <button onClick={startAdd} className="btn btn-blue" style={{ padding:'9px 24px', fontSize:15 }}>+ Добавить позицию</button>
          </div>
          {editId&&(
            <div style={{ background:'#fff', borderRadius:14, padding:'20px 24px', marginBottom:16, boxShadow:'0 2px 12px rgba(0,186,250,0.15)', border:'2px solid rgb(0,186,250)' }}>
              <div style={{ fontWeight:700, fontSize:16, marginBottom:12 }}>{editId==='new'?'Новая позиция':'Редактировать'}</div>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 2fr 1fr', gap:12, marginBottom:12 }}>
                <div><label>Категория</label><input value={form.cat} onChange={e=>setForm(f=>({...f,cat:e.target.value}))} placeholder="Маникюрный инструмент" list="cats-list" /><datalist id="cats-list">{cats.map(c=><option key={c} value={c}/>)}</datalist></div>
                <div><label>Услуга</label><input value={form.service} onChange={e=>setForm(f=>({...f,service:e.target.value}))} placeholder="Кусачки ногтевые" /></div>
                <div><label>Цена</label><input value={form.price} onChange={e=>setForm(f=>({...f,price:e.target.value}))} placeholder="400 ₽" /></div>
              </div>
              <div style={{ display:'flex', gap:10 }}>
                <button onClick={save} className="btn btn-blue" style={{ padding:'9px 24px', fontSize:15 }}>Сохранить</button>
                <button onClick={()=>setEditId(null)} className="btn btn-ghost" style={{ padding:'9px 20px', fontSize:15 }}>Отмена</button>
              </div>
            </div>
          )}
          <div style={{ background:'#fff', borderRadius:14, boxShadow:'0 2px 12px rgba(0,0,0,0.07)', overflow:'hidden' }}>
            <div style={{ display:'grid', gridTemplateColumns:'180px 1fr 120px 100px', background:'rgb(0,186,250)', color:'#fff', padding:'10px 20px', fontSize:14, fontWeight:600 }}>
              <span>Категория</span><span>Услуга</span><span>Цена</span><span>Действия</span>
            </div>
            {prices.map((row,i)=>(
              <div key={row.id} style={{ display:'grid', gridTemplateColumns:'180px 1fr 120px 100px', padding:'11px 20px', fontSize:15, alignItems:'center', background:i%2===0?'#fff':'rgba(0,186,250,0.03)', borderBottom:'1px solid #f0f0f0' }}>
                <span style={{ color:'#888', fontSize:13 }}>{row.cat}</span>
                <span>{row.service}</span>
                <span style={{ fontWeight:700, color:'rgb(0,186,250)' }}>{row.price}</span>
                <div style={{ display:'flex', gap:6 }}>
                  <button onClick={()=>startEdit(row)} className="btn btn-ghost" style={{ padding:'4px 10px', fontSize:13 }}>✎</button>
                  <button onClick={()=>setPrices(prev=>prev.filter(p=>p.id!==row.id))} className="btn btn-red" style={{ padding:'4px 10px', fontSize:13 }}>✕</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ── ORDERS ───────────────────────────────────────────────────────
    function OrdersAdmin() {
      const [orders]=useState([
        {id:1001,date:'02.05.2024',customer:'Анна Петрова',phone:'+7 (910) 111-22-33',items:'Кусачки ногтевые × 2',total:3700},
        {id:1002,date:'01.05.2024',customer:'Мария Соколова',phone:'+7 (920) 555-66-77',items:'Маникюрный аппарат × 1',total:8900},
        {id:1003,date:'30.04.2024',customer:'Ирина Белова',phone:'+7 (930) 999-00-11',items:'Пушер × 3, Пилочки × 1',total:2830},
      ]);
      return (
        <div style={{ padding:24 }}>
          <h3 style={{ fontSize:20, fontWeight:700, marginBottom:16 }}>Заказы из магазина</h3>
          <div style={{ background:'#fff', borderRadius:14, boxShadow:'0 2px 12px rgba(0,0,0,0.07)', overflow:'hidden' }}>
            <div style={{ display:'grid', gridTemplateColumns:'80px 110px 1fr 140px 1fr 100px', background:'rgb(0,186,250)', color:'#fff', padding:'10px 20px', fontSize:14, fontWeight:600 }}>
              <span>№</span><span>Дата</span><span>Клиент</span><span>Телефон</span><span>Товары</span><span>Итого</span>
            </div>
            {orders.map((o,i)=>(
              <div key={o.id} style={{ display:'grid', gridTemplateColumns:'80px 110px 1fr 140px 1fr 100px', padding:'13px 20px', fontSize:15, alignItems:'center', background:i%2===0?'#fff':'rgba(0,186,250,0.03)', borderBottom:'1px solid #f0f0f0' }}>
                <span style={{ fontWeight:700, color:'rgb(0,186,250)' }}>#{o.id}</span>
                <span style={{ color:'#888', fontSize:14 }}>{o.date}</span>
                <span style={{ fontWeight:500 }}>{o.customer}</span>

    // ── CONTACTS ADMIN ───────────────────────────────────────────────
    function ContactsAdmin() {
      const [data,setData]=useState({phone:'+7 (910) 304-30-40',email:'zatochka_test@yandex.ru',address:'г. Орёл, ул. Полесская д. 2',hours:'ПН-ПТ: 10:00–18:00\nСБ-ВС: Выходной',inn:'575207208997'});
      const [saved,setSaved]=useState(false);
      const save=()=>{setSaved(true);setTimeout(()=>setSaved(false),2000);};
      return (
        <div style={{ padding:24 }}>
          <h3 style={{ fontSize:20, fontWeight:700, marginBottom:16 }}>Контактные данные сайта</h3>
          <div style={{ background:'#fff', borderRadius:14, padding:'28px', boxShadow:'0 2px 12px rgba(0,0,0,0.07)', maxWidth:600 }}>
            {[{key:'phone',label:'Телефон'},{key:'email',label:'Email'},{key:'address',label:'Адрес'},{key:'hours',label:'График работы',type:'textarea'},{key:'inn',label:'ИНН'}].map(f=>(
              <div key={f.key} style={{ marginBottom:16 }}>
                <label>{f.label}</label>
                {f.type==='textarea'
                  ?<textarea value={data[f.key]} onChange={e=>setData(d=>({...d,[f.key]:e.target.value}))} rows={3} style={{ resize:'vertical' }}/>
                  :<input value={data[f.key]} onChange={e=>setData(d=>({...d,[f.key]:e.target.value}))}/>
                }
              </div>
            ))}
            <button onClick={save} className="btn btn-blue" style={{ padding:'11px 32px', fontSize:16 }}>{saved?'✅ Сохранено!':'Сохранить'}</button>
          </div>
        </div>
      );
    }

    // ── MAIN APP ─────────────────────────────────────────────────────
    function AdminApp() {
      const [section,setSection]=useState('products');
      const [sections,setSections]=useState(INIT_SECTIONS);
      const [prices,setPrices]=useState(INIT_PRICES);
      const [products,setProducts]=useState(()=>window.ProductStore.getAll());

      const renderContent=()=>{
        switch(section){
          case 'dashboard': return <Dashboard products={products} prices={prices} sections={sections}/>;
          case 'gallery':   return <GalleryAdmin sections={sections} setSections={setSections}/>;
          case 'prices':    return <PricesAdmin prices={prices} setPrices={setPrices}/>;
          case 'products':  return <ProductsAdmin products={products} setProducts={setProducts}/>;
          case 'orders':    return <OrdersAdmin/>;
          case 'contacts':  return <ContactsAdmin/>;
          default: return null;
        }
      };

      return (
        <div style={{ display:'flex', height:'100vh', overflow:'hidden' }}>
          <Sidebar active={section} onNav={setSection}/>
          <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
            <TopBar section={section}/>
            <div style={{ flex:1, overflowY:'auto', display:'flex', flexDirection:'column' }}>
              {renderContent()}
            </div>
          </div>
        </div>
      );
    }

    const root=ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AdminApp/>);
  </script>
</body>
</html>
