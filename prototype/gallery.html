<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Острый край — Галерея</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="components/Header.js"></script>
  <script src="components/Footer.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: rgb(245,245,245); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    .gallery-img {
      background: rgb(220,220,220);
      border-radius: 10px;
      overflow: hidden;
      aspect-ratio: 4/3;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      display: flex; align-items: center; justify-content: center;
      color: #aaa; font-size: 13px; font-family: monospace;
    }
    .gallery-img:hover { transform: scale(1.03); box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
    .section-label {
      display: inline-block;
      background: rgb(0,186,250);
      color: #fff;
      font-size: 48px;
      font-weight: 500;
      padding: 0 20px;
      border-radius: 0 120px 0 0;
      line-height: 1.2;
      margin-bottom: 4px;
    }
    .section-underline {
      height: 5px; background: rgb(0,186,250); border-radius: 2px; margin-bottom: 32px;
    }
    .lightbox {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; cursor: zoom-out;
    }
    .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; box-shadow: 0 8px 64px rgba(0,0,0,0.5); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    // Placeholder gallery items using available images
    const OUR_WORKS = [
      { src: 'assets/services1.jpg', label: 'Заточка кусачек' },
      { src: 'assets/services2.jpg', label: 'Заточка ножниц' },
      { src: 'assets/block1.jpg', label: 'Работа мастера' },
      { src: 'assets/services1.jpg', label: 'Результат заточки' },
      { src: 'assets/services2.jpg', label: 'Инструмент до/после' },
      { src: 'assets/block1.jpg', label: 'Мастерская' },
    ];

    const EXHIBITION = [
      { src: 'assets/services1.jpg', label: 'Выставка 2023' },
      { src: 'assets/services2.jpg', label: 'Выставка 2023' },
      { src: 'assets/block1.jpg', label: 'Наш стенд' },
      { src: 'assets/services1.jpg', label: 'Встреча мастеров' },
      { src: 'assets/services2.jpg', label: 'Демонстрация' },
    ];

    const CERTIFICATES = [
      { src: 'assets/services1.jpg', label: 'Сертификат 1' },
      { src: 'assets/services2.jpg', label: 'Сертификат 2' },
      { src: 'assets/block1.jpg', label: 'Сертификат 3' },
      { src: 'assets/services1.jpg', label: 'Сертификат 4' },
    ];

    function GalleryGrid({ items, onOpen }) {
      return (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 20 }}>
          {items.map((item, i) => (
            <div key={i} className="gallery-img"
              style={{ background: `url(${item.src}) center/cover no-repeat` }}
              onClick={() => onOpen(item.src)}
              title={item.label}
            />
          ))}
        </div>
      );
    }

    function GallerySection({ title, items, onOpen }) {
      const [showAll, setShowAll] = useState(false);
      const visible = showAll ? items : items.slice(0, 6);
      return (
        <section style={{ marginBottom: 64 }}>
          <div>
            <div className="section-label">{title}</div>
            <div className="section-underline" />
          </div>
          <GalleryGrid items={visible} onOpen={onOpen} />
          {items.length > 6 && (
            <div style={{ textAlign: 'center', marginTop: 28 }}>
              <button onClick={() => setShowAll(!showAll)} style={{
                background: 'rgb(0,186,250)', color: '#fff', border: 'none',
                borderRadius: 12, padding: '14px 48px', fontSize: 20, fontWeight: 700,
                cursor: 'pointer', boxShadow: '0 4px 0 rgba(9,136,189,0.7)',
                fontFamily: 'Inter, sans-serif', transition: 'transform .1s',
              }}>
                {showAll ? 'Свернуть' : 'Показать больше'}
              </button>
            </div>
          )}
        </section>
      );
    }

    function GalleryPage() {
      const [lightbox, setLightbox] = useState(null);

      return (
        <div style={{ display: 'flex', flexDirection: 'column', minHeight: '100vh' }}>
          <SiteHeader activePage="Галерея" />
          <main style={{ flex: 1, maxWidth: 1300, margin: '0 auto', padding: '64px 40px', width: '100%' }}>
            <GallerySection title="Наши работы" items={OUR_WORKS} onOpen={setLightbox} />
            <GallerySection title="Фото выставок" items={EXHIBITION} onOpen={setLightbox} />
            <GallerySection title="Наши сертификаты" items={CERTIFICATES} onOpen={setLightbox} />
          </main>
          <SiteFooter />

          {lightbox && (
            <div className="lightbox" onClick={() => setLightbox(null)}>
              <img src={lightbox} alt="Увеличенное фото" onClick={e => e.stopPropagation()} />
              <button onClick={() => setLightbox(null)} style={{
                position: 'fixed', top: 24, right: 32, background: 'rgba(255,255,255,0.15)',
                border: '2px solid rgba(255,255,255,0.4)', color: '#fff',
                width: 44, height: 44, borderRadius: '50%', fontSize: 24,
                cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>×</button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<GalleryPage />);
  </script>
</body>
</html>
